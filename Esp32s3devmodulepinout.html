<script>
let dark=localStorage.getItem('theme')!=='light';
document.documentElement.setAttribute('data-theme',dark?'dark':'light');
document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
document.getElementById('themeBtn').addEventListener('click',()=>{
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
  localStorage.setItem('theme',dark?'dark':'light');
});

document.addEventListener('DOMContentLoaded',function(){
  const svg=document.querySelector('svg');
  if(!svg)return;
  let titleEl=null,subtitleEl=null;
  svg.querySelectorAll('text').forEach(t=>{
    const content=t.textContent.trim();
    const fs=t.getAttribute('font-size');
    if(content.includes('ESP32-S3-MINI-1-N8')&&content.includes('Dev Module')){
      t.setAttribute('font-size','24');
      t.setAttribute('y','34');
      t.setAttribute('font-weight','700');
      titleEl=t;
    } else if(content.includes('Andres Moreno')||content.includes('Electrical and Electronics')){
      t.setAttribute('font-size','13');
      t.setAttribute('y','54');
      subtitleEl=t;
    } else if(fs==='9'){
      t.setAttribute('font-size','11');
    }
  });
  // Move title & subtitle to end of SVG so they render on top of all other elements
  if(titleEl)svg.appendChild(titleEl);
  if(subtitleEl)svg.appendChild(subtitleEl);

  // Extend viewBox upward so heading is above the PCB drawing area
  svg.setAttribute('viewBox','0 -70 1117 910');
  if(titleEl)titleEl.setAttribute('y','-45');
  if(subtitleEl)subtitleEl.setAttribute('y','-22');

  // Light-mode: flip only heading/subtitle text colour; pin colours stay untouched
  // Also fix near-black module elements that blend into dark bg but show as dark spots on light bg
  let darkFillEls=null;
  function applyTextTheme(){
    const isLight=document.documentElement.getAttribute('data-theme')==='light';
    if(titleEl)titleEl.setAttribute('fill',isLight?'#0d1526':'#e6edf3');
    if(subtitleEl)subtitleEl.setAttribute('fill',isLight?'#4a5a78':'#6e7681');
    if(isLight&&!darkFillEls){
      darkFillEls=[];
      svg.querySelectorAll('[fill]').forEach(el=>{
        if(el===titleEl||el===subtitleEl)return;
        const f=el.getAttribute('fill');
        if(!f||!f.startsWith('#'))return;
        let h=f.replace('#','');
        if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
        const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
        if((0.299*r+0.587*g+0.114*b)/255<0.10){darkFillEls.push({el,orig:f});}
      });
    }
    if(darkFillEls){
      darkFillEls.forEach(({el,orig})=>el.setAttribute('fill',isLight?'#faf7f2':orig));
    }
  }
  applyTextTheme();
  document.getElementById('themeBtn').addEventListener('click',applyTextTheme);

  // ── Zoom controls ──
  const SVG_BASE = 1117;
  let zoomLevel = 1.0;
  function applyZoom(){
    const newW = Math.round(SVG_BASE * zoomLevel);
    svg.setAttribute('width', newW);
    svg.setAttribute('height', Math.round(840 * zoomLevel));
    document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
  }
  applyZoom();
  document.getElementById('zoomIn').addEventListener('click', () => {
    zoomLevel = Math.min(4.0, parseFloat((zoomLevel + 0.25).toFixed(2)));
    applyZoom();
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    zoomLevel = Math.max(0.3, parseFloat((zoomLevel - 0.25).toFixed(2)));
    applyZoom();
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    zoomLevel = 1.0;
    applyZoom();
  });
});
</script>
